<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="nav-bar">
      <h1>
        The Recipe Repository
      </h1>
    	  <button id="home" onclick="window.location.href='/app'">Home</button>
          <button id="logout-button" onclick="logout()">Logout</button>
    </div>
<p>Welcome to The Recipe Repository!</p>
<p>This will be a recipe sharing and shopping planner application.</p>

<form id="recipe-creator">
      <h4>
        Create New Recipe
      </h4>
        <input
          class="input-area"
          type="text"
          id="recipe-title"
          placeholder="Title"
          required
        /><br />
	<label for="recipe-image">Select a file:</label>
	<input type="file" id="recipe-image" name="recipe_pic" accept=".jpg, .jpeg, .png"><br />
	<div id="ingredients-wrapper">
        <div class="ingredient-row" style="margin-top: 10px;">
          <div class="searchable-dropdown">
		  <input type="text" id="dbSearch" placeholder="Search from database..." onkeyup="filterOptions()">
		  <input type="hidden" id="ingredient_uuid" name="ingredient_id">
		  <ul id="optionsList" class="dropdown-content">
		    <!-- Database items will appear here -->
		  </ul>
		</div>
          <input class="input-area" type="number" step="any" name="quantity" placeholder="qty (1)" required />
          <label for="unit">Unit:</label>
                <select name="unit" id="cars">
                  <option value="cup">Cups</option>
                  <option value="tablespoon">Tablespoons</option>
                  <option value="teaspoon">Teaspoons</option>
                  <option value="gram">Grams</option>
                </select>
          <button type="button" class="remove-btn">×</button>
        </div>
      </div>
        <div class="button-container" style="margin-top: 5px;margin-bottom: 5px;">
        <button type="button" id="add-ingredient">Add Ingredient</button>
      </div>
	<div class="description">
	  <textarea id="author-description" name="description" rows="4" cols="50">Tell us about your recipe...</textarea>
	</div>
<button type="submit">Submit</button>
    </form>

    <script>
async function fetchDbOptions() {
  try {
    const response = await fetch('/api/get_ingredients');
    const items = await response.json();
    populateList(items.ingredients);
  } catch (err) {
    console.error("Failed to load database options:", err);
  }
}

function populateList(items) {
  const list = document.getElementById('optionsList');
  list.innerHTML = items.map(item => `
	  <li onclick="selectItem('${item.name}', '${item.id}')">${item.name}</li>
  `).join('');
}

function filterOptions() {
  const input = document.getElementById('dbSearch').value.toLowerCase();
  const listItems = document.querySelectorAll('#optionsList li');

  listItems.forEach(li => {
    const text = li.textContent.toLowerCase();
    li.style.display = text.includes(input) ? "block" : "none";
  });
}

function selectItem(name, id) {
  document.getElementById('dbSearch').value = name;
  document.getElementById('ingredient_uuid').value = id;
}
fetchDbOptions();
    </script>
</body>
