<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="/app.js" defer></script>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
  <div class="navbar">
          <div class="heading">
          <h1>The Recipe Repository</h1>
          </div>

          <a href="/">Home</a>
          
          <div class="nav-dropdown">
                  <button class="dropbtn">Create
                          <i class="fa fa-caret-down"></i>
                  </button>
                  <div class="dropbtn-content">
                          <a href="/recipe-creator">New Recipe</a>
			  <a href="/shopping-list-creator">New Shopping List</a>
                  </div>
          </div>
           <button class="requires-login" id="shopping-lists-btn">Shopping Lists</button>
          <button class="navbtn" id="logout-button" onclick="logout()">Logout</button>
  </div>

  <div id="shopping_list-viewer">    
    <h2>
      {{ .Name }}
      <hr></h2>
      <h4>
      </h4>
    
      <div class="ingredients_in_list">
        <ul id="ingredients">
                {{ range .Items }}
                <li>
			{{ .Name }}
			{{ .FromUnit }}
			{{ .ToUnit }}
			{{ .Ratio }}
			{{ .Units }}
			{{ .Quantity }}
		</li>
                {{ else }}
                <li>No recipes have been added...</li>
                {{ end }}
        </ul>
        </div>
</body>
</html>
