<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="/app.js" defer></script>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
  <div id="navbar"></div>
  <script type="module">
          import { loadNav } from '../js/components.js';
          loadNav();
  </script>

  <h1> {{ .UserName }}'s Shopping Lists </h1>

  <div id="shopping-list-viewer">    
	  <ul id="shoppinglists">
		  {{ range .UserLists }}
		  <li>
    <h2>
	    <a class="listlink" data-id="{{ .ID }}" href="#">{{ .Name }}</a>
      <hr></h2>
      <h4>
         Created: {{ .CreatedAt.Format "Jan 02, 2006" }}
	 <br/>
	 Updated: {{ .UpdatedAt.Format "Jan 02, 2006" }}
      </h4>
      <div class="list-btns">
	      <button id="delete-list">Delete</button>
	      <button id="print-list">Print</button>
      </div>
		  </li>
		  {{ else }}
		  <li>No lists have been made</li>
		  {{ end }}
        </ul>
  </div>
<script type="module">
	import { getUserShoppingList } from '../js/api.js';

	const lists = document.getElementById('shoppinglists');
	lists.addEventListener('click', async (event) => {
		const link = event.target.closest('.listlink');
		if (!link) return;
		event.preventDefault();
		await getUserShoppingList(link.dataset.id);
	});
</script>
</body>
</html>
