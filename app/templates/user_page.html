<!DOCTYPE html>
<head>
<title>The Recipe Repository</title>
<script src="/app.js" defer></script>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
  <div id="navbar"></div>
  <script type="module">
          import { loadNav } from '../js/components.js';
          loadNav();
  </script>

  <div id="user-recipes">
	<h2> {{ .Name }} </h2>
	<hr>
	<ul> {{ range .Recipes }}
		<li> <a href="/recipes/{{ .ID }}">{{ .Title }}</a> <br /> Created: {{ .CreatedAt.Format "Jan 02, 2006" }}<hr>
		<div class="content-card">
			<img src={{ .ImageURL }} class="card-image">
		</div>
		</li>
	     {{ else }}
	     	<li>No recipes have been uploaded by this user</li>
	     {{ end }}
	</ul>
</div>
</body>
