<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
  <div id="navbar"></div>
  <script type="module">
	  import { loadNav } from '/js/components.js';
	  loadNav();
  </script>

<p>Welcome to The Recipe Repository!</p>
<p>This will be a recipe sharing and shopping planner application.</p>

<div class="shopping-list-creator">
    <form id="shopping-list-creator">
        <h4>
        Create New Shopping List
      </h4><br />
      <p>Input the name of your shopping list:</p>

        <input
          class="input-area"
          type="text"
          id="shopping-list-title"
          placeholder="Title"
          required
        /><br />
    </form>
</div>

<script type="module">
    import { postShoppingList } from '/js/api.js'

    const form = document.getElementById('shopping-list-creator');
    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await postShoppingList();
        });
    }
</script>
