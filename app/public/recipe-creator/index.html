<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
     <div id="navbar"></div>
	  <script type="module">
		  import { loadNav } from '/js/components.js';
		  loadNav();
	  </script>

<form id="recipe-creator">
      <h4>
        Create New Recipe
      </h4>
        <input
          class="input-area"
          type="text"
          id="recipe-title"
          placeholder="Title"
          required
        /><br />
	<label for="recipe-image">Select a file:</label>
	<input type="file" id="recipe-image" name="recipe_pic" accept=".jpg, .jpeg, .png"><br />
	<div id="ingredients-wrapper">
        <div class="ingredient-row" style="margin-top: 10px;">
		  <input list="ingredient-list" type="text" class="db-search-input" placeholder="Search from database...">
		  <input type="hidden" id="ingredient_uuid" class="ingredient_uuid" name="ingredient_id">
		  
          <input class="input-area" type="number" step="any" name="quantity" placeholder="qty (1)" required />
          <label for="unit">Unit:</label>
                <select name="unit" class="ingredient-units">
                  <option>...</option>
                </select>
          <button type="button" class="remove-btn">×</button>
        </div>
	<datalist id="ingredient-list"></datalist>
      </div>
        <div class="button-container" style="margin-top: 5px;margin-bottom: 5px;">
        <button type="button" id="add-ingredient">Add Ingredient</button>
      </div>
	<div class="description">
	  <textarea id="author-description" name="description" rows="4" cols="50">Tell us about your recipe...</textarea>
	</div>
<button type="submit">Submit</button>
    </form>

<script type="module" src="/js/recipeCreator.js"></script>
<script type="module">
	import { fetchDbOptions } from "/js/recipeCreator.js";
	await fetchDbOptions();
</script>
<script type="module">
	import { postRecipe } from "/js/api.js";
	const form = document.getElementById('recipe-creator');
	form.addEventListener('submit', async (event) => {
        	event.preventDefault();
		await postRecipe(form);
	});
</script>
</body>
