<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="navbar">
          <div class="heading">
          <h1>The Recipe Repository</h1>
          </div>

          <a href="/">Home</a>
          
          <div class="nav-dropdown">
                  <button class="dropbtn">Create
                          <i class="fa fa-caret-down"></i>
                  </button>
                  <div class="dropbtn-content">
                          <a href="/recipe-creator">New Recipe</a>
                          <a href="/shopping-list-creator">New Shopping List</a>
                  </div>
          </div>
          <button class="navbtn" id="logout-button" onclick="logout()">Logout</button>
          <button class="navbtn" id="login-btn" type="button" onclick="window.location.href='/login'">Login</button>
          <button class="navbtn" id="signup-btn" type="button" onclick="window.location.href='/signup'">Sign Up</button>
  </div>

<form id="recipe-creator">
      <h4>
        Create New Recipe
      </h4>
        <input
          class="input-area"
          type="text"
          id="recipe-title"
          placeholder="Title"
          required
        /><br />
	<label for="recipe-image">Select a file:</label>
	<input type="file" id="recipe-image" name="recipe_pic" accept=".jpg, .jpeg, .png"><br />
	<div id="ingredients-wrapper">
        <div class="ingredient-row" style="margin-top: 10px;">
		  <input list="ingredient-list" type="text" class="db-search-input" placeholder="Search from database...">
		  <input type="hidden" class="ingredient_uuid" name="ingredient_id">
		  
          <input class="input-area" type="number" step="any" name="quantity" placeholder="qty (1)" required />
          <label for="unit">Unit:</label>
                <select name="unit">
                  <option value="cup">Cups</option>
                  <option value="tablespoon">Tablespoons</option>
                  <option value="teaspoon">Teaspoons</option>
                  <option value="gram">Grams</option>
                </select>
          <button type="button" class="remove-btn">×</button>
        </div>
	<datalist id="ingredient-list"></datalist>
      </div>
        <div class="button-container" style="margin-top: 5px;margin-bottom: 5px;">
        <button type="button" id="add-ingredient">Add Ingredient</button>
      </div>
	<div class="description">
	  <textarea id="author-description" name="description" rows="4" cols="50">Tell us about your recipe...</textarea>
	</div>
<button type="submit">Submit</button>
    </form>

    <script>
async function fetchDbOptions() {
  try {
    const response = await fetch('/api/get_ingredients');
    const items = await response.json();
    populateList(items.ingredients);
  } catch (err) {
    console.error("Failed to load database options:", err);
  }
}

function populateList(items) {
  const list = document.getElementById('ingredient-list');
  list.innerHTML = items.map(item => `
	  <option value="${item.name}" data-id="${item.id}"></option>
  `).join('');
}

function filterOptions() {
  const input = document.getElementById('dbSearch').value.toLowerCase();
  const listItems = document.querySelectorAll('#ingredient-list option');

  listItems.forEach(option => {
    const text = option.textContent.toLowerCase();
    option.style.display = text.includes(input) ? "block" : "none";
  });
}

function selectItem(name, id) {
  document.getElementById('ingredient_uuid').value = id;
}
fetchDbOptions();

    </script>
</body>
