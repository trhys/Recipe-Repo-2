<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository - Signup</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="navbar">
          <div class="heading">
          <h1>The Recipe Repository</h1>
          </div>

          <a href="/">Home</a>
          
          <div class="nav-dropdown">
                  <button class="dropbtn">Create
                          <i class="fa fa-caret-down"></i>
                  </button>
                  <div class="dropbtn-content">
                          <a href="/recipe-creator">New Recipe</a>
                          <a href="/shopping-list-creator">New Shopping List</a>
                  </div>
          </div>
          <button class="navbtn" id="logout-button" onclick="logout()">Logout</button>
          <button class="navbtn" id="login-btn" type="button" onclick="window.location.href='/login'">Login</button>
          <button class="navbtn" id="signup-btn" type="button" onclick="window.location.href='/signup'">Sign Up</button>
  </div>

     <form id="signup-form">
        <input
          class="input-area"
          type="email"
          id="email"
          placeholder="Email"
          required
	  /><br />
        <input
          class="input-area"
          type="password"
          id="password"
          placeholder="Password"
          required
	  /><br />
	<input
          class="input-area"
          type="text"
          id="username"
          placeholder="Username"
          required
	  /><br />
        <div class="button-container">
          <button id="signup-btn" type="submit" style="margin-top: 5px;">SignUp</button>
        </div>
      </form>
