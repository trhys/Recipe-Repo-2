<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository - Signup</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="navbar"></div>
  <script type="module">
          import { loadNav } from '/js/components.js';
          loadNav();
  </script>

  <h2>
	  Sign Up
  </h2>
     <form id="signup-form">
        <input
          class="input-area"
          type="email"
          id="email"
          placeholder="Email"
          required
	  /><br />
        <input
          class="input-area"
          type="password"
          id="password"
          placeholder="Password"
          required
	  style="margin-top: 5px; margin-bottom: 5px"
	  /><br />
	<input
          class="input-area"
          type="text"
          id="username"
          placeholder="Username"
          required
	  /><br />
        <div class="button-container">
          <button id="signup-btn" type="submit" style="margin-top: 5px;">SignUp</button>
        </div>
      </form>

<script type="module">
	import { signup } from '../js/api.js'

	const form = document.getElementById('signup-form');

	form.addEventListener('submit', async (e) => {
		e.preventDefault();
		await signup();
	});
</script>
</body>
</html>
