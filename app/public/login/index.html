<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository - Login</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
   <div class="nav-bar">
      <h1>
        The Recipe Repository
      </h1>
          <button id="home" onclick="window.location.href='/'">Home</button>
    </div>
  <div id="auth-section">
      <h2>Login</h2>
      <form id="login-form">
        <input
          class="input-area"
          type="email"
          id="email"
          placeholder="Email"
          required
        />
        <input
          class="input-area"
          type="password"
          id="password"
          placeholder="Password"
          required
        />
        <div class="button-container">
          <button type="submit" style="margin-top: 5px;">Login</button>
        </div>
      </form>
    </div>
</body>
</html>
