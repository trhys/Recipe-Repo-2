<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository - Login</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="navbar"></div>
  <script type="module">
          import { loadNav } from '../js/components.js';
          loadNav();
  </script>

  <div id="error-box" 
     class="error" 
     style="display: none;" 
     role="alert">
  </div>

  <div id="auth-section">
      <h2>Login</h2>
      <form id="login-form">
        <input
          class="input-area"
          type="email"
          id="email"
          placeholder="Email"
          required
        />
        <input
          class="input-area"
          type="password"
          id="password"
          placeholder="Password"
          required
        />
        <div class="button-container">
          <button type="submit" style="margin-top: 5px;">Login</button>
        </div>
      </form>
    </div>

<script type="module">
	import { auth } from '../js/auth.js'

	const form = document.getElementById('login-form');

	form.addEventListener('submit', async (e) => {
		e.preventDefault();
		try {
			await auth.getSession();
			window.location.href = '/';
		} catch (error) {
			const err = document.getElementById('error-box');
			err.textContent = error.message;
			err.style.display = 'block';
		}
	});
</script>

</body>
</html>
