<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="app.js" defer></script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
  <div class="navbar">
	  <div class="heading">
	  <h1>The Recipe Repository</h1>
	  </div>

	  <a href="/">Home</a>
          
          <div class="nav-dropdown">
                  <button class="requires-login">Create
                          <i class="fa fa-caret-down"></i>
                  </button>
                  <div class="dropbtn-content">
                          <a class="requires-login" href="/recipe-creator">New Recipe</a>
                          <a class="requires-login" href="/shopping-list-creator">New Shopping List</a>
                  </div>
          </div>
	  <button class="requires-login" id="shopping-lists-btn">Shopping Lists</button>
          <button class="requires-login" id="logout-button" onclick="logout()">Logout</button>
          <a href="/login" class="loginbtn">Log In</a>
          <a href="/signup" class="loginbtn">Sign Up</a>
  </div>

<p>Welcome to The Recipe Repository!</p>
<p>This will be a recipe sharing and shopping planner application.</p>

  <div id="recipes-section">
    <h3>
      Recipes
    </h3>
    <ul id="recipes"></ul>
  </div>
</body>
</html>
