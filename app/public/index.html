<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="app.js" defer></script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
</head>
<body>
  <div id="navbar"></div>
  <script type="module">
	  import { loadNav } from '/js/components.js';
	  loadNav();
  </script>

<p>Welcome to The Recipe Repository!</p>
<p>This will be a recipe sharing and shopping planner application.</p>

  <div id="recipes-section">
    <h3>
      Recipes
    </h3>
    <ul id="recipes"></ul>
  </div>

<script type="module">
	import { getRecipes, getUserPage } from '/js/api.js';

	async function handleGetRecipes() {
		try {
			const data = await getRecipes();
			if (data.recipes == null) return;
			const recipeList = document.getElementById('recipes');
			recipeList.innerHTML = '';
			for (const recipe of data.recipes) {
				const listItem = document.createElement('li');
				const displayDate = new Date(recipe.created_at).toLocaleDateString();
				listItem.innerHTML = `
				      <div class="card-content" style="display: block;">
					<a href="/recipes/${recipe.id}">
					<h4>${recipe.title}</h4></a>
					<p>Created: ${displayDate}</p>
					<a class="userlink" data-userid="${recipe.user_id}" href="#">
					<h5>Author: ${recipe.author}</h5></a>
					<br /><div class="content-card">
					<img src=${recipe.image_url} class="card-image">
					</div>
				      </div>`;
				recipeList.appendChild(listItem);
			}

			recipeList.addEventListener('click', async (e) => {
				const link = event.target.closest('.userlink');
				if (!link) return;

				e.preventDefault();
				await getUserPage(link.dataset.userid);
			});
		} catch (error) {
			alert(`Error: ${error.message}`)
		}
	}

	handleGetRecipes()
</script>
</body>
</html>
