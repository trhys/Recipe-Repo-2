<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository - Login</title>
  <script src="../app.js" defer></script>
</head>
<body>
 
  <div id="auth-section">
      <h2>Login</h2>
      <form id="login-form">
        <input
          class="input-area"
          type="email"
          id="email"
          placeholder="Email"
          required
        />
        <input
          class="input-area"
          type="password"
          id="password"
          placeholder="Password"
          required
        />
        <div class="button-container">
          <button type="submit" style="margin-top: 5px;">Login</button>
        </div>
      </form>
    </div>
</body>
</html>
