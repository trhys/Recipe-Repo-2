<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="nav-bar">
      <h1>
        The Recipe Repository
      </h1>
          <button id="home" onclick="window.location.href='/app'">Home</button>
          <button id="logout-button" onclick="logout()">Logout</button>
    </div>
<p>Welcome to The Recipe Repository!</p>
<p>This will be a recipe sharing and shopping planner application.</p>

<form id="add-ingredient-panel">
      <h4>
        Create New Ingredient
      </h4>
        <input
          class="input-area"
          type="text"
          id="ingredient-name"
          placeholder="Name"
          required
        /><br />
        <label for="ingredient-image">Select a file:</label>
        <input type="file" id="ingredient-image" name="ingredient_pic" accept=".jpg, .jpeg, .png"><br />
        <button type="submit">Submit</button>
    </form>
