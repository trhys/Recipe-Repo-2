<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository</title>
<script src="../app.js" defer></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="navbar">
          <div class="heading">
          <h1>The Recipe Repository</h1>
          </div>

          <a href="/">Home</a>
          
          <div class="nav-dropdown">
                  <button class="requires-login">Create
                          <i class="fa fa-caret-down"></i>
                  </button>
                  <div class="dropbtn-content">
                          <a class="requires-login" href="/recipe-creator">New Recipe</a>
                          <a class="requires-login" href="/shopping-list-creator">New Shopping List</a>
                  </div>
          </div>
          <button class="requires-login" id="shopping-lists-btn">Shopping Lists</button>
          <button class="requires-login" id="logout-button" onclick="logout()">Logout</button>
          <a href="/login" class="loginbtn">Log In</a>
          <a href="/signup" class="loginbtn">Sign Up</a>
  </div>

<form id="add-ingredient-panel">
      <h4>
        Create New Ingredient
      </h4>
        <input
          class="input-area"
          type="text"
          id="ingredient-name"
          placeholder="Name"
          required
        /><br />
        <label for="ingredient-image">Select a file:</label>
        <input type="file" id="ingredient-image" name="ingredient_pic" accept=".jpg, .jpeg, .png"><br />
        <button type="submit">Submit</button>
    </form>
