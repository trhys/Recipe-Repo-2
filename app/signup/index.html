<!DOCTYPE html>
<html>
<head>
<title>The Recipe Repository - Signup</title>
  <script src="../app.js" defer></script>
</head>
<body>
	<h1>
		SignUp
	</h1>

     <form id="signup-form">
        <input
          class="input-area"
          type="email"
          id="email"
          placeholder="Email"
          required
	  /><br />
        <input
          class="input-area"
          type="password"
          id="password"
          placeholder="Password"
          required
	  /><br />
	<input
          class="input-area"
          type="text"
          id="username"
          placeholder="Username"
          required
	  /><br />
        <div class="button-container">
          <button id="signup-btn" type="submit" style="margin-top: 5px;">SignUp</button>
        </div>
      </form>
